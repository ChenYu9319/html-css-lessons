<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Box Model Example</title>
    <style>
        .box{
            width: 100px;
            height: 100px;
            margin: 15px;
            padding: 10px;
            border: 5px solid skyblue;
            background-color: bisque;
            margin: auto;
            border-radius: 5px 5px 40px 40px;
        }
    </style>
</head>
<body>
    <div class="box">
        <h1>HELLO</h1>
    </div>
</body>
</html>
